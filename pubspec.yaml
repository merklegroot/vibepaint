name: vibepaint
description: A vibe coded paint app.
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: assets/app_icon.png
  macos:
    generate: true
  windows:
    generate: true

flutter:
  uses-material-design: true
