name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (optional — auto-increments patch if empty)"
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          bump_patch() {
            local ver="${1#v}"
            local major minor patch
            IFS='.' read -r major minor patch _ <<< "$ver"
            major=${major:-0}
            minor=${minor:-0}
            patch=${patch:-0}
            echo "${major}.${minor}.$((patch + 1))"
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              VERSION="${{ inputs.version }}"
            else
              LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -1)
              if [ -n "$LATEST_TAG" ]; then
                VERSION=$(bump_patch "$LATEST_TAG")
              else
                VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
              fi
            fi
            TAG="v${VERSION}"

            CURRENT_BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
            BUILD=$((CURRENT_BUILD + 1))
            sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            git commit -m "Release ${TAG}"
            git push origin HEAD:master
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"

            BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
            sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.artifact }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: macos
          - os: windows-latest
            platform: windows
            artifact: windows
          - os: ubuntu-latest
            platform: linux
            artifact: linux

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'master' || github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev \
            flatpak flatpak-builder desktop-file-utils curl snapd

      - name: Install Snapcraft
        if: matrix.platform == 'linux'
        run: |
          sudo systemctl enable --now snapd.socket
          sudo snap install snapcraft --classic

      - name: Install dependencies
        run: flutter pub get

      - name: Sync pubspec version
        shell: bash
        run: |
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          VERSION_LINE="version: ${{ needs.prepare.outputs.version }}+${BUILD}"
          if [ "$(uname)" = "Darwin" ]; then
            sed -i '' "s/^version: .*/${VERSION_LINE}/" pubspec.yaml
          else
            sed -i "s/^version: .*/${VERSION_LINE}/" pubspec.yaml
          fi

      - name: Build
        run: flutter build ${{ matrix.platform }} --release --dart-define=VIBE_RELEASE_BUILD=true

      - name: Package macOS
        if: matrix.platform == 'macos'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/VibePaint.app"
          DMG="VibePaint-${VERSION}-macos.dmg"
          ZIP="VibePaint-${VERSION}-macos.app.zip"

          # Optional polish for the DMG layout (falls back to hdiutil).
          brew install create-dmg || true
          chmod +x scripts/macos/package_dmg.sh

          scripts/macos/package_dmg.sh "$APP" "$DMG" "$VERSION"

          # Finder-friendly zip of the .app (keeps the bundle intact).
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"

          ls -lh "$DMG" "$ZIP"

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          chmod +x scripts/linux/package_release.sh
          scripts/linux/package_release.sh \
            --bundle build/linux/x64/release/bundle \
            --version "${{ needs.prepare.outputs.version }}" \
            --output-dir "$GITHUB_WORKSPACE"

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        run: choco install innosetup -y --no-progress

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          pwsh scripts/windows/package_release.ps1 `
            -SourceDir build/windows/x64/runner/Release `
            -Version "${{ needs.prepare.outputs.version }}" `
            -OutputZip "VibePaint-${{ needs.prepare.outputs.version }}-win-x64.zip" `
            -InstallerOutput "VibePaint-${{ needs.prepare.outputs.version }}-win-x64-setup.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibePaint-${{ matrix.artifact }}
          path: |
            VibePaint-${{ needs.prepare.outputs.version }}-macos.dmg
            VibePaint-${{ needs.prepare.outputs.version }}-macos.app.zip
            VibePaint-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz
            VibePaint-${{ needs.prepare.outputs.version }}-linux-x64.AppImage
            VibePaint-${{ needs.prepare.outputs.version }}-linux-x64.deb
            VibePaint-${{ needs.prepare.outputs.version }}-linux-x64.rpm
            VibePaint-${{ needs.prepare.outputs.version }}-linux-x64.pkg.tar.zst
            VibePaint-${{ needs.prepare.outputs.version }}-linux-x64-aur.tar.gz
            VibePaint-${{ needs.prepare.outputs.version }}-linux-x64.flatpak
            VibePaint-${{ needs.prepare.outputs.version }}-linux-x64.snap
            VibePaint-${{ needs.prepare.outputs.version }}-win-x64.zip
            VibePaint-${{ needs.prepare.outputs.version }}-win-x64-setup.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'master' || github.ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: VibePaint-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: VibePaint ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          body: |
            ### macOS
            - Download **`VibePaint-${{ needs.prepare.outputs.version }}-macos.dmg`**
            - Open the disk image and drag **VibePaint** into **Applications**
            - First launch: **right-click → Open → Open** (unsigned build; one-time Gatekeeper prompt)

            ### Windows
            - **Recommended:** **`VibePaint-${{ needs.prepare.outputs.version }}-win-x64-setup.exe`** — run the installer (Start menu shortcut, uninstall via Settings → Apps)
            - **Portable:** **`VibePaint-${{ needs.prepare.outputs.version }}-win-x64.zip`** — extract and run `VibePaint\VibePaint.exe` without installing
            - First launch: if SmartScreen appears, click **More info → Run anyway** (unsigned build; one-time prompt)

            ### Linux
            Pick the format that fits your distro:

            | Format | File | Install |
            | --- | --- | --- |
            | **AppImage** | `VibePaint-<version>-linux-x64.AppImage` | `chmod +x VibePaint-*.AppImage && ./VibePaint-*.AppImage` — runs on most distros without installing |
            | **Debian/Ubuntu** | `VibePaint-<version>-linux-x64.deb` | `sudo apt install ./VibePaint-<version>-linux-x64.deb` |
            | **Fedora/RHEL/openSUSE** | `VibePaint-<version>-linux-x64.rpm` | `sudo dnf install ./VibePaint-<version>-linux-x64.rpm` (or `zypper in` on openSUSE) |
            | **Arch Linux** | `VibePaint-<version>-linux-x64.pkg.tar.zst` | `sudo pacman -U ./VibePaint-<version>-linux-x64.pkg.tar.zst` |
            | **Arch (yay/paru/AUR)** | `VibePaint-<version>-linux-x64-aur.tar.gz` | Extract, then `makepkg -si` (or publish the included `PKGBUILD` to AUR as `vibepaint-bin`) |
            | **Flatpak** | `VibePaint-<version>-linux-x64.flatpak` | `flatpak install --user ./VibePaint-<version>-linux-x64.flatpak` then launch **VibePaint** from your app menu |
            | **Snap** | `VibePaint-<version>-linux-x64.snap` | `sudo snap install ./VibePaint-<version>-linux-x64.snap --dangerous` |
            | **Portable tarball** | `VibePaint-<version>-linux-x64.tar.gz` | Extract and run `bundle/vibepaint` |

            Installed `.deb`, `.rpm`, and `.pkg.tar.zst` packages place the app in `/opt/vibepaint` and add a **VibePaint** launcher to your application menu.
          files: dist/*
