name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: macos
          - os: windows-latest
            platform: windows
            artifact: windows
          - os: ubuntu-latest
            platform: linux
            artifact: linux

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build
        run: flutter build ${{ matrix.platform }} --release

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent VibePaint.app "VibePaint-${{ steps.version.outputs.tag }}-macos.zip"
          mv "VibePaint-${{ steps.version.outputs.tag }}-macos.zip" "$GITHUB_WORKSPACE/"

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          cd build/linux/x64/release
          tar -czf "$GITHUB_WORKSPACE/VibePaint-${{ steps.version.outputs.tag }}-linux-x64.tar.gz" bundle

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "VibePaint-${{ steps.version.outputs.tag }}-win-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibePaint-${{ matrix.artifact }}
          path: |
            VibePaint-${{ steps.version.outputs.tag }}-macos.zip
            VibePaint-${{ steps.version.outputs.tag }}-linux-x64.tar.gz
            VibePaint-${{ steps.version.outputs.tag }}-win-x64.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: VibePaint-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VibePaint ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*
